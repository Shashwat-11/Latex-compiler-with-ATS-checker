# Render Blueprint — https://render.com/docs/blueprint-spec
services:
  - type: web
    name: overleaf
    env: docker
    repo: https://github.com/Shashwat-11/Latex-compiler-with-ATS-checker
    branch: master
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "3001"
      - key: DATABASE_URL
        fromDatabase:
          name: overleaf-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: CORS_ORIGIN
        value: https://overleaf.onrender.com
      - key: PDF_STORAGE_PATH
        value: /var/data/overleaf/pdfs
      - key: LATEX_DOCKER_IMAGE
        value: texlive/texlive:latest-minimal
      - key: LATEX_TIMEOUT_SECONDS
        value: "60"
      - key: GEMINI_API_KEY
        sync: false

databases:
  - name: overleaf-db
    databaseName: overleaf
    user: overleaf
    plan: starter
