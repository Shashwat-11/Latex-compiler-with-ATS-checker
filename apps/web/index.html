<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Overleaf - Personal LaTeX editor with real-time PDF preview" />
    <meta name="theme-color" content="#2563eb" />
    <title>Overleaf — LaTeX Editor</title>
    <script>
      (function(){try{var t=JSON.parse(localStorage.getItem('overleaf-ui')).state.theme;if(t==='dark'||(t==='system'&&matchMedia('(prefers-color-scheme:dark)').matches)){document.documentElement.classList.add('dark');document.documentElement.style.colorScheme='dark'}}catch(e){}})();
    </script>
  </head>
  <body class="antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
