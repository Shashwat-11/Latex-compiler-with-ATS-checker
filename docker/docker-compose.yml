services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: overleaf
      POSTGRES_PASSWORD: overleaf
      POSTGRES_DB: overleaf
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U overleaf"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
